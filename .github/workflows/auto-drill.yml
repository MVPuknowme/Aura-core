name: SkyGrid Auto Drill

on:
  workflow_dispatch:
    inputs:
      primary_url:
        description: Primary URL to probe
        required: false
        default: https://skygrid-gs3e.b12sites.com/
      fallback_url:
        description: Fallback URL to probe
        required: false
        default: https://github.com/MVPuknowme/Aura-core
      simulate_failure:
        description: Force simulated fallback recommendation
        required: false
        default: "true"
  schedule:
    - cron: "17 */6 * * *"
  pull_request:
    paths:
      - scripts/auto-drill.sh
      - scripts/build-drill-dashboard.py
      - .github/workflows/auto-drill.yml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: auto-drill-pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  auto-drill:
    name: Run safe failover auto drill
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare drill script
        run: chmod +x scripts/auto-drill.sh

      - name: Run auto drill
        env:
          PRIMARY_URL: ${{ github.event.inputs.primary_url || 'https://skygrid-gs3e.b12sites.com/' }}
          FALLBACK_URL: ${{ github.event.inputs.fallback_url || 'https://github.com/MVPuknowme/Aura-core' }}
          SIMULATE_FAILURE: ${{ github.event.inputs.simulate_failure || 'true' }}
          SAMPLES: '3'
          TIMEOUT_SECONDS: '10'
        run: ./scripts/auto-drill.sh

      - name: Build dashboard HTML
        run: python3 scripts/build-drill-dashboard.py

      - name: Upload telemetry artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: skygrid-auto-drill-reports
          path: |
            drill-reports/
            public/
          if-no-files-found: warn

      - name: Configure Pages metadata
        id: pages_config
        uses: actions/configure-pages@v6
        continue-on-error: true
        with:
          # Do not try to create/enable the Pages site with GITHUB_TOKEN.
          # One-time setup must be done in repo Settings → Pages → Source: GitHub Actions.
          enablement: false

      - name: Record Pages not enabled
        if: steps.pages_config.outcome != 'success'
        run: |
          {
            echo "# Auto drill dashboard deploy skipped"
            echo
            echo "Auto drill completed and telemetry artifacts were uploaded, but GitHub Pages is not enabled yet."
            echo
            echo "Manual one-time setup required:"
            echo "1. Open repo Settings."
            echo "2. Open Pages."
            echo "3. Set Build and deployment Source to GitHub Actions."
            echo "4. Rerun this workflow."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning title=Pages not enabled::Auto drill reports were preserved as artifacts. Enable Pages to publish dashboard."

      - name: Upload Pages artifact
        if: steps.pages_config.outcome == 'success'
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.pages_config.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
