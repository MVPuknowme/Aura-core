name: Michael Smoke Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Repository smoke check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          set -euo pipefail
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch/ref: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
          uname -a

      - name: Validate repository files
        run: |
          set -euo pipefail
          ls -la
          test -f package.json && cat package.json | jq -r '.name, .version' || echo "No package.json found; skipping package metadata."

      - name: Confirm workflow health
        run: |
          set -euo pipefail
          echo "Smoke check passed. Aura-Core workflow runner is healthy."
