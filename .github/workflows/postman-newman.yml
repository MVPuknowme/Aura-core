name: Postman Newman Reliability Checks

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: Public SkyGrid/B12 site URL
        required: false
        default: https://aura-sky-skygrid-protocol.b12sites.com/
        type: string
      base_url:
        description: Primary API/base URL
        required: false
        default: https://aura-sky-skygrid-protocol.b12sites.com
        type: string
      aws_service_url:
        description: AWS service URL after deploy
        required: false
        default: https://aura-sky-skygrid-protocol.b12sites.com
        type: string
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: read

jobs:
  newman:
    name: Run Postman/Newman smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SITE_URL: ${{ inputs.site_url || 'https://aura-sky-skygrid-protocol.b12sites.com/' }}
      BASE_URL: ${{ inputs.base_url || 'https://aura-sky-skygrid-protocol.b12sites.com' }}
      AWS_SERVICE_URL: ${{ inputs.aws_service_url || 'https://aura-sky-skygrid-protocol.b12sites.com' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Prepare report directory
        run: mkdir -p reports/newman

      - name: Run Newman collection
        run: |
          set -euo pipefail
          newman run postman/skygrid-reliability.collection.json \
            --env-var "site_url=$SITE_URL" \
            --env-var "base_url=$BASE_URL" \
            --env-var "aws_service_url=$AWS_SERVICE_URL" \
            --timeout-request 10000 \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export reports/newman/newman-results.xml \
            --reporter-htmlextra-export reports/newman/newman-report.html

      - name: Upload Newman reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: postman-newman-reports
          path: reports/newman/
          if-no-files-found: warn
