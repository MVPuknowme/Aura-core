name: Postman Newman Reliability Checks

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: Public Aura Sky / SKYGRID site URL
        required: false
        default: https://mvpuknowme.github.io/Aura-core/
        type: string
      base_url:
        description: Primary static site base URL
        required: false
        default: https://mvpuknowme.github.io/Aura-core
        type: string
      aws_service_url:
        description: Optional AWS service URL after deploy
        required: false
        default: https://mvpuknowme.github.io/Aura-core
        type: string
  push:
    branches:
      - MVPuknowme
    paths:
      - postman/**
      - site/**
      - .github/workflows/postman-newman.yml
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: read

jobs:
  newman:
    name: Run Postman/Newman smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SITE_URL: ${{ inputs.site_url || 'https://mvpuknowme.github.io/Aura-core/' }}
      BASE_URL: ${{ inputs.base_url || 'https://mvpuknowme.github.io/Aura-core' }}
      AWS_SERVICE_URL: ${{ inputs.aws_service_url || 'https://mvpuknowme.github.io/Aura-core' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Prepare report directory
        run: mkdir -p reports/newman

      - name: Run Newman collection
        run: |
          set -euo pipefail
          newman run postman/skygrid-reliability.collection.json \
            --env-var "site_url=$SITE_URL" \
            --env-var "base_url=$BASE_URL" \
            --env-var "aws_service_url=$AWS_SERVICE_URL" \
            --timeout-request 10000 \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export reports/newman/newman-results.xml \
            --reporter-htmlextra-export reports/newman/newman-report.html

      - name: Upload Newman reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: postman-newman-reports
          path: reports/newman/
          if-no-files-found: warn
