name: Revenue Pipeline

on:
  workflow_dispatch:
    inputs:
      dune_query_id:
        description: Optional Dune query ID to execute
        required: false
        type: string
      airtable_table:
        description: Airtable table name
        required: false
        default: Projects
        type: string
      debug_mode:
        description: Enable verbose validation output
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '15 * * * *'

jobs:
  revenue-pipeline:
    runs-on: ubuntu-latest
    env:
      DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
      DUNE_QUERY_ID: ${{ inputs.dune_query_id || secrets.DUNE_QUERY_ID }}
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID || 'appg4cfKNcNqOtOdd' }}
      AIRTABLE_TABLE: ${{ inputs.airtable_table || secrets.AIRTABLE_TABLE || 'Projects' }}
      DEBUG_MODE: ${{ inputs.debug_mode || 'true' }}
    steps:
      - name: Validate configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [ -n "${AIRTABLE_API_KEY:-}" ] || missing+=("AIRTABLE_API_KEY")
          [ -n "${AIRTABLE_BASE_ID:-}" ] || missing+=("AIRTABLE_BASE_ID")

          if [ -z "${DUNE_API_KEY:-}" ] || [ -z "${DUNE_QUERY_ID:-}" ]; then
            echo "SKIP_DUNE=true" >> "$GITHUB_ENV"
          else
            echo "SKIP_DUNE=false" >> "$GITHUB_ENV"
          fi

          if [ "${DEBUG_MODE:-true}" = "true" ]; then
            echo "Workflow debug summary"
            echo "- DUNE analytics: $([ -z "${DUNE_API_KEY:-}" ] || [ -z "${DUNE_QUERY_ID:-}" ] && echo skipped || echo enabled)"
            echo "- AIRTABLE_API_KEY set: $([ -n "${AIRTABLE_API_KEY:-}" ] && echo yes || echo no)"
            echo "- AIRTABLE_BASE_ID set: $([ -n "${AIRTABLE_BASE_ID:-}" ] && echo yes || echo no)"
            echo "- AIRTABLE_TABLE: ${AIRTABLE_TABLE:-Projects}"
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error title=Missing workflow configuration::Missing required values: ${missing[*]}"
            echo "Add the missing repository secrets in Settings > Secrets and variables > Actions, then rerun this workflow."
            exit 1
          fi

      - name: Execute Dune pipeline
        id: dune_exec
        if: env.SKIP_DUNE != 'true'
        run: |
          response=$(curl --silent --show-error --fail \
            --request POST \
            --url https://api.dune.com/api/v1/pipelines/execute \
            --header "Content-Type: application/json" \
            --header "X-Dune-Api-Key: $DUNE_API_KEY" \
            --data "{\"query_id\": $DUNE_QUERY_ID, \"performance\": \"medium\"}")
          echo "$response"
          pipeline_execution_id=$(echo "$response" | python3 -c 'import sys, json; print(json.load(sys.stdin)["pipeline_execution_id"])')
          echo "pipeline_execution_id=$pipeline_execution_id" >> "$GITHUB_OUTPUT"

      - name: Wait for completion
        if: env.SKIP_DUNE != 'true'
        run: |
          pipeline_id='${{ steps.dune_exec.outputs.pipeline_execution_id }}'
          for i in $(seq 1 30); do
            status=$(curl --silent --show-error --fail \
              --url "https://api.dune.com/api/v1/pipelines/executions/$pipeline_id/status" \
              --header "X-Dune-Api-Key: $DUNE_API_KEY")
            echo "$status"
            state=$(echo "$status" | python3 -c 'import sys, json; data=json.load(sys.stdin); print(data.get("state",""))')
            if [ "$state" = "QUERY_STATE_COMPLETED" ] || [ "$state" = "PIPELINE_STATE_COMPLETED" ]; then
              exit 0
            fi
            if echo "$state" | grep -Eq 'FAILED|CANCELLED|ERROR'; then
              exit 1
            fi
            sleep 20
          done
          echo "Pipeline did not complete in time" >&2
          exit 1

      - name: Fetch latest Dune results
        if: env.SKIP_DUNE != 'true'
        run: |
          curl --silent --show-error --fail \
            --url "https://api.dune.com/api/v1/query/$DUNE_QUERY_ID/results?limit=10" \
            --header "X-Dune-Api-Key: $DUNE_API_KEY" \
            -o dune-results.json
          cat dune-results.json

      - name: Create skip summary when Dune is disabled
        if: env.SKIP_DUNE == 'true'
        run: |
          cat > dune-results.json <<'JSON'
          {"result":{"rows":[{"status":"Dune analytics skipped because DUNE_API_KEY or DUNE_QUERY_ID is not configured"}]}}
          JSON
          echo "::warning::Dune analytics skipped because DUNE_API_KEY or DUNE_QUERY_ID is not configured"

      - name: Post summary to Airtable
        run: |
          python3 <<'PY'
          import json, os, urllib.parse, urllib.request

          with open('dune-results.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          rows = data.get('result', {}).get('rows', [])
          summary = json.dumps(rows[:3], ensure_ascii=False)[:900]
          query_id = os.environ.get('DUNE_QUERY_ID') or 'not configured'
          payload = {
              'records': [
                  {
                      'fields': {
                          'Project Name': 'Revenue Pipeline',
                          'Description': f'Dune query {query_id} latest rows: {summary}',
                          'Status': 'In progress'
                      }
                  }
              ]
          }

          table = urllib.parse.quote(os.environ.get('AIRTABLE_TABLE', 'Projects'), safe='')
          url = f'https://api.airtable.com/v0/{os.environ["AIRTABLE_BASE_ID"]}/{table}'
          req = urllib.request.Request(url, data=json.dumps(payload).encode('utf-8'), method='POST')
          req.add_header('Authorization', f'Bearer {os.environ["AIRTABLE_API_KEY"]}')
          req.add_header('Content-Type', 'application/json')
          with urllib.request.urlopen(req) as resp:
              print(resp.read().decode('utf-8'))
          PY
