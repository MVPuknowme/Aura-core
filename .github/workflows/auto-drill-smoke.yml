name: Auto Drill Smoke Test

on:
  push:
    branches: ["MVPuknowme"]
    paths:
      - "services/auto_drill/**"
      - ".github/workflows/auto-drill-smoke.yml"
  pull_request:
    paths:
      - "services/auto_drill/**"
      - ".github/workflows/auto-drill-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  auto-drill-smoke:
    name: Auto Drill pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: services/auto_drill/requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r services/auto_drill/requirements.txt pytest

      - name: Run Auto Drill smoke tests
        run: |
          set -euo pipefail
          cd services/auto_drill
          pytest -q

      - name: Verify Auto Drill endpoints import
        run: |
          set -euo pipefail
          cd services/auto_drill
          python - <<'PY'
          from app import app
          client = app.test_client()
          for path in ["/health", "/validation/config", "/routes/recommend", "/routes/auto-switch"]:
              response = client.get(path)
              if response.status_code != 200:
                  raise SystemExit(f"{path} returned {response.status_code}: {response.data!r}")
              print(f"OK {path}")
          PY
