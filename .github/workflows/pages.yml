name: Deploy Aura Sky SKYGRID site

on:
  push:
    branches:
      - MVPuknowme
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/status/health.json
          grep -q 'SKYGRID by Aura-Core' site/index.html
          grep -q 'pilot_demo_only' site/status/health.json

      - name: Configure Pages metadata
        uses: actions/configure-pages@v6
        with:
          # Do not try to create/enable the Pages site with GITHUB_TOKEN.
          # One-time setup must be done in repo Settings → Pages → Source: GitHub Actions.
          enablement: false

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
