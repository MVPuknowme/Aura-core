name: Publish Aura Sky SKYGRID Site

on:
  push:
    branches:
      - MVPuknowme
    paths:
      - 'site/**'
      - 'scripts/audit-site.mjs'
      - '.github/workflows/publish-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  audit:
    name: Audit static site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run static site audit
        run: node scripts/audit-site.mjs

  deploy:
    name: Deploy to GitHub Pages
    needs: audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages metadata
        id: pages_config
        uses: actions/configure-pages@v6
        continue-on-error: true
        with:
          # Do not let the workflow token try to create/enable the Pages site.
          # One-time setup required: Settings → Pages → Source: GitHub Actions.
          enablement: false

      - name: Record Pages not enabled
        if: steps.pages_config.outcome != 'success'
        run: |
          {
            echo "# GitHub Pages deploy skipped"
            echo
            echo "The site audit passed, but GitHub Pages is not enabled for this repository yet."
            echo
            echo "Manual one-time setup required:"
            echo "1. Open repo Settings."
            echo "2. Open Pages."
            echo "3. Set Build and deployment Source to GitHub Actions."
            echo "4. Rerun this workflow."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning title=Pages not enabled::Enable Settings → Pages → Source: GitHub Actions, then rerun."

      - name: Upload site artifact
        if: steps.pages_config.outcome == 'success'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.pages_config.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
