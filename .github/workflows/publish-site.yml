name: Publish Aura Sky SKYGRID Site

on:
  push:
    branches:
      - MVPuknowme
    paths:
      - 'site/**'
      - 'scripts/audit-site.mjs'
      - '.github/workflows/publish-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  audit:
    name: Audit static site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run static site audit
        run: node scripts/audit-site.mjs

  deploy:
    name: Deploy to GitHub Pages
    needs: audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages metadata
        uses: actions/configure-pages@v6
        with:
          # Do not try to create/enable the Pages site with GITHUB_TOKEN.
          # One-time setup must be done in repo Settings → Pages → Source: GitHub Actions.
          enablement: false

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
