name: Summarize new issues

on:
  issues:
    types: [opened]

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Build deterministic issue summary
        id: summary
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title || 'Untitled issue';
            const body = issue.body || '';
            const compact = body
              .replace(/```[\s\S]*?```/g, '[code block omitted]')
              .replace(/`/g, "'")
              .replace(/\s+/g, ' ')
              .trim();
            const excerpt = compact.length > 900 ? compact.slice(0, 900) + '…' : compact;
            const summary = [
              '### SkyGrid Issue Summary',
              `**Title:** ${title.replace(/`/g, "'")}`,
              '',
              excerpt
                ? `**Summary:** ${excerpt}`
                : '**Summary:** No issue body was provided.',
              '',
              '**Sentinel posture:** summary generated without AWS deployment actions, wallet movement, or secret access.'
            ].join('\n');
            core.setOutput('body', summary);

      - name: Store summary in environment
        shell: bash
        run: |
          {
            echo 'ISSUE_SUMMARY<<EOF'
            cat <<'SUMMARY_EOF'
          ${{ steps.summary.outputs.body }}
          SUMMARY_EOF
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Comment with issue summary
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: process.env.ISSUE_SUMMARY
            });
