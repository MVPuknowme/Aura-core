name: Validator Health

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  validator-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run validator telemetry
        run: node scripts/validator-health-check.mjs

      - name: Upload telemetry artifact
        uses: actions/upload-artifact@v4
        with:
          name: validator-health-report
          path: reports/validator-health.json
