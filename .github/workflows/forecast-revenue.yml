name: Forecast Revenue

# Trigger note: run patched Airtable preflight instead of rerunning an old failed workflow snapshot.
on:
  workflow_dispatch:
    inputs:
      airtable_base_id:
        description: Optional Airtable base ID override, for example appXXXXXXXXXXXXXX
        required: false
        default: ""
      airtable_table:
        description: Optional Airtable table override
        required: false
        default: ""
  push:
    branches:
      - MVPuknowme
    paths:
      - .github/workflows/forecast-revenue.yml
  schedule:
    - cron: '45 * * * *'

jobs:
  forecast:
    runs-on: ubuntu-latest

    env:
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY || secrets.AIRTABLE_TOKEN }}
      AIRTABLE_BASE_ID: ${{ inputs.airtable_base_id || secrets.AIRTABLE_BASE_ID }}
      AIRTABLE_TABLE: ${{ inputs.airtable_table || secrets.AIRTABLE_TABLE_NAME || 'Table 1' }}

    steps:
      - name: Validate Airtable configuration
        run: |
          set -euo pipefail
          missing=()

          [ -n "${AIRTABLE_API_KEY:-}" ] || missing+=("AIRTABLE_API_KEY or AIRTABLE_TOKEN")
          [ -n "${AIRTABLE_BASE_ID:-}" ] || missing+=("AIRTABLE_BASE_ID")
          [ -n "${AIRTABLE_TABLE:-}" ] || missing+=("AIRTABLE_TABLE or AIRTABLE_TABLE_NAME")

          echo "Airtable forecast preflight"
          echo "- AIRTABLE_API_KEY configured: $([ -n "${AIRTABLE_API_KEY:-}" ] && echo yes || echo no)"
          echo "- AIRTABLE_BASE_ID configured: $([ -n "${AIRTABLE_BASE_ID:-}" ] && echo yes || echo no)"
          echo "- AIRTABLE_TABLE: ${AIRTABLE_TABLE:-missing}"

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error title=Missing Airtable configuration::Configure %s in MVPuknowme/Aura-core repository secrets, or provide workflow_dispatch inputs where available.\n' "${missing[*]}"
            exit 1
          fi

          if [[ ! "${AIRTABLE_BASE_ID}" =~ ^app[A-Za-z0-9]+$ ]]; then
            echo "::warning title=Unexpected Airtable base ID format::Airtable base IDs usually start with app. Current value is masked by GitHub if it is a secret."
          fi

      - name: Fetch Airtable data
        run: |
          python3 <<'PY'
          import json, os, urllib.error, urllib.parse, urllib.request

          table = urllib.parse.quote(os.environ['AIRTABLE_TABLE'], safe='')
          url = f"https://api.airtable.com/v0/{os.environ['AIRTABLE_BASE_ID']}/{table}"
          req = urllib.request.Request(url)
          req.add_header('Authorization', f"Bearer {os.environ['AIRTABLE_API_KEY']}")
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as exc:
              body = exc.read().decode('utf-8', errors='replace')
              raise SystemExit(f"Airtable fetch failed: HTTP {exc.code}. Check AIRTABLE_BASE_ID, AIRTABLE_TABLE, token permissions, and table name. Body: {body[:500]}")
          with open('airtable.json', 'w', encoding='utf-8') as f:
              json.dump(data, f)
          print(json.dumps({'records': len(data.get('records', []))}))
          PY

      - name: Forecast revenue
        run: |
          python3 <<'PY'
          import json, re

          with open('airtable.json', encoding='utf-8') as f:
              data = json.load(f)

          values = []
          for rec in data.get('records', []):
              notes = rec.get('fields', {}).get('Notes', '')
              match = re.search(r'total_usd=\$?([0-9.]+)', notes)
              if match:
                  values.append(float(match.group(1)))

          avg = sum(values[-24:]) / len(values[-24:]) if values else 0.0
          daily = avg * 24
          weekly = daily * 7
          monthly = daily * 30

          forecast = {
              'hourly_avg': round(avg, 2),
              'daily_estimate': round(daily, 2),
              'weekly_estimate': round(weekly, 2),
              'monthly_estimate': round(monthly, 2),
              'sample_size': len(values[-24:])
          }

          print(json.dumps(forecast))
          with open('forecast.json', 'w', encoding='utf-8') as f:
              json.dump(forecast, f)
          PY

      - name: Log forecast to Airtable
        run: |
          python3 <<'PY'
          import json, os, urllib.error, urllib.parse, urllib.request

          with open('forecast.json', encoding='utf-8') as f:
              forecast = json.load(f)

          notes = (
              f"Hourly Avg: ${forecast['hourly_avg']}\n"
              f"Daily: ${forecast['daily_estimate']}\n"
              f"Weekly: ${forecast['weekly_estimate']}\n"
              f"Monthly: ${forecast['monthly_estimate']}\n"
              f"Sample Size: {forecast['sample_size']}"
          )

          payload = {
              'records': [{
                  'fields': {
                      'Name': 'Revenue Forecast',
                      'Notes': notes,
                      'Status': 'ACTIVE'
                  }
              }]
          }

          table = urllib.parse.quote(os.environ['AIRTABLE_TABLE'], safe='')
          url = f"https://api.airtable.com/v0/{os.environ['AIRTABLE_BASE_ID']}/{table}"
          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode('utf-8'),
              method='POST'
          )
          req.add_header('Authorization', f"Bearer {os.environ['AIRTABLE_API_KEY']}")
          req.add_header('Content-Type', 'application/json')
          try:
              with urllib.request.urlopen(req) as resp:
                  print(resp.read().decode('utf-8'))
          except urllib.error.HTTPError as exc:
              body = exc.read().decode('utf-8', errors='replace')
              raise SystemExit(f"Airtable write failed: HTTP {exc.code}. Check field names Name/Notes/Status, table permissions, and token scopes. Body: {body[:500]}")
          PY
