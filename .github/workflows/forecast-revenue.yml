name: Forecast Revenue

on:
  workflow_dispatch:
    inputs:
      airtable_base_id:
        description: Optional Airtable base ID override
        required: false
        default: ""
      airtable_table:
        description: Optional Airtable table override
        required: false
        default: ""
  push:
    branches:
      - MVPuknowme
    paths:
      - .github/workflows/forecast-revenue.yml
  schedule:
    - cron: '45 * * * *'

jobs:
  forecast:
    runs-on: ubuntu-latest

    env:
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY || secrets.AIRTABLE_TOKEN }}
      AIRTABLE_BASE_ID: ${{ inputs.airtable_base_id || secrets.AIRTABLE_BASE_ID }}
      AIRTABLE_TABLE: ${{ inputs.airtable_table || secrets.AIRTABLE_TABLE_NAME || 'Table 1' }}

    steps:
      - name: Airtable preflight
        run: |
          set -euo pipefail
          echo "Airtable forecast preflight"
          echo "- AIRTABLE_API_KEY configured: $([ -n "${AIRTABLE_API_KEY:-}" ] && echo yes || echo no)"
          echo "- AIRTABLE_BASE_ID configured: $([ -n "${AIRTABLE_BASE_ID:-}" ] && echo yes || echo no)"
          echo "- AIRTABLE_TABLE: ${AIRTABLE_TABLE:-missing}"
          if [ -z "${AIRTABLE_API_KEY:-}" ] || [ -z "${AIRTABLE_BASE_ID:-}" ]; then
            echo "::warning title=Airtable forecast integration pending::Missing Airtable credentials. Running proof-safe placeholder forecast."
          fi

      - name: Build forecast artifact
        run: |
          python3 <<'PY'
          import json, os, re, urllib.parse, urllib.request

          api_key = os.environ.get('AIRTABLE_API_KEY', '').strip()
          base_id = os.environ.get('AIRTABLE_BASE_ID', '').strip()
          table_name = os.environ.get('AIRTABLE_TABLE', 'Table 1').strip()
          data = {'records': [], 'mode': 'placeholder_no_airtable'}

          if api_key and base_id and table_name:
              table = urllib.parse.quote(table_name, safe='')
              url = f'https://api.airtable.com/v0/{base_id}/{table}'
              req = urllib.request.Request(url)
              req.add_header('Authorization', f'Bearer {api_key}')
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      data = json.load(resp)
                      data['mode'] = 'live_airtable'
              except Exception as exc:
                  data = {'records': [], 'mode': 'placeholder_airtable_error', 'warning': str(exc)}

          values = []
          for rec in data.get('records', []):
              notes = rec.get('fields', {}).get('Notes', '')
              match = re.search(r'total_usd=\$?([0-9.]+)', notes)
              if match:
                  values.append(float(match.group(1)))

          avg = sum(values[-24:]) / len(values[-24:]) if values else 0.0
          forecast = {
              'hourly_avg': round(avg, 2),
              'daily_estimate': round(avg * 24, 2),
              'weekly_estimate': round(avg * 24 * 7, 2),
              'monthly_estimate': round(avg * 24 * 30, 2),
              'sample_size': len(values[-24:]),
              'mode': data.get('mode', 'placeholder_no_verified_revenue')
          }

          print(json.dumps(forecast))
          with open('airtable.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2)
          with open('forecast.json', 'w', encoding='utf-8') as f:
              json.dump(forecast, f, indent=2)
          PY

      - name: Upload forecast artifact
        uses: actions/upload-artifact@v4
        with:
          name: forecast-revenue
          path: |
            airtable.json
            forecast.json
          if-no-files-found: error
